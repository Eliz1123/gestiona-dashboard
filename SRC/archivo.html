<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Archivo | GESTIONA!</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="CSS/styles.css">
</head>

<body>

  <!-- NAV -->
  <nav class="nav">
    <div class="flex items-center space-x-2">
      <div class="relative flex items-center justify-center w-10 h-10">
        <span class="text-4xl font-serif font-black text-[#D82299] absolute -translate-x-2 -translate-y-1 z-20">G</span>
        <span class="text-4xl font-serif font-black text-[#3F2574] absolute translate-x-1.5 translate-y-1.5 z-10 opacity-90">T</span>
      </div>

      <div class="flex flex-col pl-4 leading-none">
        <span class="text-2xl font-black tracking-widest">GESTIONA!</span>
        <span class="text-[9px] text-slate-400 uppercase">Dashboard de Gestión de Tickets</span>
      </div>
    </div>
  </nav>

  <!-- HERO -->
  <section class="hero upload-hero">
    <div class="hero-content">

      <h1>Gestiona tu <span>Archivo</span></h1>

      <p class="descripcion-archivo">
        Sube un archivo en formato Excel (.xlsx o .xls)
      </p>

      <!-- CARD -->
      <div class="upload-card">

        <label class="upload-box" id="zonaDrop">
          <input id="inputArchivo" type="file" accept=".xlsx, .xls">

          <div class="upload-content">

            <!-- ICONO -->
            <img id="iconoExcel"
              src="https://cdn-icons-png.flaticon.com/512/732/732220.png"
              class="w-16 mx-auto mb-3 hidden">

            <p id="textoPrincipal">ARRASTRA TU ARCHIVO AQUÍ</p>
            <span id="textoSecundario">o haz clic para seleccionar</span>

          </div>
        </label>

        <p id="nombreArchivo" class="mt-3 text-sm text-gray-400">
          Ningún archivo seleccionado
        </p>

        <button id="btnAnalizar" class="btn-main mt-4">
          Analizar Archivo
        </button>

      </div>

    </div>
  </section>

  <script src="JS/archivo.js"></script>

</body>
</html>
